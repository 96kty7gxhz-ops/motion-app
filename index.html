<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Motion App</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

#topBar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:10px;
}

#timer{
    font-size:48px;
}

#timeInput{
    font-size:28px;
    width:120px;
}

#mainArea{
    position:relative;
    width:100vw;
    height:70vh;
    overflow:hidden;
}

#mainImage{
    width:100%;
    height:100%;
    object-fit:cover;
}

#video{
    position:absolute;
    top:10px;
    left:10px;

    width:160px;
    height:220px;

    object-fit:cover;

    border:3px solid white;
    border-radius:20px;

    z-index:10;

    transform:scaleX(-1);
}

</style>
</head>
<body>

<div id="topBar">

    <div id="timer">60</div>

    <input
        id="timeInput"
        type="number"
        value="60"
        min="10"
    >
    <input
        type="file"
        id="imageInput"
        accept="image/*"
    >

</div>

<div id="mainArea">

    <video
        id="video"
        autoplay
        playsinline
        muted
    ></video>

    <img
        id="mainImage"
        src="https://picsum.photos/800/1200"
    >

</div>

<div id="status">待機中</div>

<button id="startBtn">開始</button>

<button id="switchBtn">カメラ切替</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video");
const timerText = document.getElementById("timer");
const statusText = document.getElementById("status");
const startBtn = document.getElementById("startBtn");

let prevY = null;
let lastMoveTime = Date.now();

let remain = 60;
let timerStarted = false;

let currentFacing = "user";
let currentStream = null;

let camera = null;
let hands = null;
let timerInterval = null;

function speak(text){
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "ja-JP";
    speechSynthesis.speak(uttr);
}

async function start(){
    remain =
    parseInt(
    document.getElementById("timeInput").value
    );

    startBtn.style.display="none";

    currentStream =
    await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:　currentStream,
            width:640,
            height:480
        }
    });

    video.srcObject = currentStream;

    hands = new Hands({
        locateFile: (file)=>{
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
    });

    hands.setOptions({
        maxNumHands:1,
        modelComplexity:0,
        minDetectionConfidence:0.5,
        minTrackingConfidence:0.5
    });

    hands.onResults(results=>{

        if(results.multiHandLandmarks.length > 0){

            const hand = results.multiHandLandmarks[0];

            const y = hand[0].y;

            if(prevY !== null){

                const speed = Math.abs(y - prevY);

                if(speed > 0.01){

                    lastMoveTime = Date.now();
                    statusText.innerText = "動作中";
                    statusText.style.color = "lime";

                }
            }

            prevY = y;
        }

        const stopTime =
        (Date.now() - lastMoveTime)/1000;

        if(stopTime > 2){

            statusText.innerText = "止まっています";
            statusText.style.color = "red";

            speak("どうして止めているのですか？動かしてください");

            lastMoveTime = Date.now();
        }
    });

    camera = new Camera(video,{
        onFrame: async()=>{
            await hands.send({image:video});
        },
        width:640,
        height:480
    });

    camera.start();

    if(!timerStarted){

        timerStarted = true;

        timerInterval = setInterval(()=>{
            if(remain <= 0){
        return;
    }

    remain--;

    timerText.innerText = remain;

    if(remain <= 10 && remain > 0){

        speak(remain.toString());
    }

            if(remain === 0){ 
               speak("出せ、びゅ、びゅ～、気持ちいですか？");

    statusText.innerText = "終了";
    statusText.style.color = "white";

    // タイマー停止
    clearInterval(timerInterval);

    // カメラ停止
    if(currentStream){

        currentStream
        .getTracks()
        .forEach(track=>{
            track.stop();
        });
    }

    // MediaPipe停止
    if(camera){
        camera.stop();
    }
} 
            },1000);
}
}
           

startBtn.onclick = start;

async function switchCamera(){

    if(currentStream){

        currentStream.getTracks().forEach(track=>{
            track.stop();
        });
    }

    currentFacing =
    currentFacing === "user"
    ? "environment"
    : "user";

    currentStream =
    await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode: currentFacing,
            width:640,
            height:480
        }
    });

    video.srcObject = currentStream;

     if(camera){
        camera.stop();
    }

    camera = new Camera(video,{
        onFrame: async()=>{
            await hands.send({image:video});
        },
        width:640,
        height:480
    });

    camera.start();
}

document
.getElementById("switchBtn")
.onclick = switchCamera;

document
.getElementById("imageInput")
.addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const url = URL.createObjectURL(file);

    document
    .getElementById("mainImage")
    .src = url;
});
<!-- update -->
</script>
</body>
</html>
